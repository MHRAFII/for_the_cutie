<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Halima 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #cfe3e3, #f8dada);
    overflow: hidden;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #ff8c8c;
    animation: float 6s linear infinite;
    font-size: 18px;
}

@keyframes float {
    0% {transform: translateY(100vh); opacity: 0;}
    50% {opacity: 1;}
    100% {transform: translateY(-10vh); opacity: 0;}
}

/* Pages */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 15px;
    box-sizing: border-box;
}

.active {
    display: flex;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    max-width: 400px;
    width: 100%;
}

/* Text */
h1 {
    color: #ff8c8c;
    font-family: 'Great Vibes', cursive;
    font-size: 28px;
}

p {
    color: #555;
    font-size: 16px;
    line-height: 1.5;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background: #ff8c8c;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff6f6f;
    transform: scale(1.05);
}

/* Image */
img {
    width: 100%;
    border-radius: 12px;
}

/* Typing fix */
.typing {
    white-space: normal;   /* FIXED */
    word-wrap: break-word; /* FIXED */
    overflow: hidden;
}
</style>
</head>

<body>

<!-- Floating hearts -->
<script>
for(let i=0;i<15;i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (4 + Math.random()*3) + "s";
    document.body.appendChild(heart);
}
</script>

<!-- PAGE 1 -->
<div class="page active" id="page1">
    <div class="card">
        <h1>Wussup my cutie loving wifey Halima 💕</h1>
        <button onclick="nextPage(2)">Open Me 💌</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
    <div class="card">
        <p id="message" class="typing"></p>
        <button onclick="nextPage(3)">Open Me Again 💖</button>
    </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
    <div class="card">
        <img src="happy.jpeg" alt="Happy Birthday">
    </div>
</div>

<script>
function nextPage(pageNumber) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page' + pageNumber).classList.add('active');

    if(pageNumber === 2){
        typeText();
    }
}

/* Typing animation (fixed for mobile) */
function typeText() {
    const text = "I am sorry Halima that I can't give you as much time as I should and I am very far away... 💔";
    let i = 0;
    const speed = 35;
    const target = document.getElementById("message");
    target.innerHTML = "";

    function typing() {
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}
</script>

</body>
</html>
